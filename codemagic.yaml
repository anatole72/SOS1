workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1 # Бесплатный и быстрый тип сервера
    environment:
      groups:
        - android-signing
      vars:
        PACKAGE_NAME: "io.codemagic.sosapp"
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Generate Gradle Wrapper (if missing)
        script: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com # Замените на свою почту, чтобы получить APK
        notify:
          success: true
          failure: true